<svg xmlns="http://www.w3.org/2000/svg" width="760" height="248" viewBox="0 0 760 248" font-family="'SFMono-Regular','Consolas','Liberation Mono',Menlo,monospace" font-size="14">
  <!-- terminal window -->
  <rect x="0" y="0" width="760" height="248" rx="10" fill="#1e1e2e"/>
  <!-- title bar -->
  <rect x="0" y="0" width="760" height="32" rx="10" fill="#313244"/>
  <rect x="0" y="20" width="760" height="12" fill="#313244"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text x="380" y="21" fill="#9399b2" text-anchor="middle" font-size="12">child-photo-upload-job — 다중 인물 필터</text>

  <!-- command -->
  <text x="18" y="62"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">child-photo-upload-job filter ./photos ./sorted </tspan><tspan fill="#f9e2af">--person doyun minchan</tspan></text>

  <!-- output lines -->
  <text x="18" y="92"  fill="#a6e3a1">저장: <tspan fill="#cdd6f4">IMG_6075.JPG  -> 2022-07/IMG_6075.JPG</tspan></text>
  <text x="18" y="114" fill="#f38ba8">대상 인물 아님(건너뜀): <tspan fill="#6c7086">IMG_6140.JPG</tspan></text>
  <text x="18" y="136" fill="#a6e3a1">저장: <tspan fill="#cdd6f4">IMG_1409.HEIC -> 2023-04/IMG_1409.HEIC  (doyun)</tspan></text>
  <text x="18" y="158" fill="#a6e3a1">저장: <tspan fill="#cdd6f4">IMG_1411.HEIC -> 2023-04/IMG_1411.HEIC  (minchan)</tspan></text>
  <text x="18" y="180" fill="#6c7086">…</text>

  <!-- summary -->
  <text x="18" y="212" font-weight="bold"><tspan fill="#89b4fa">완료:</tspan><tspan fill="#cdd6f4"> 전체 91장 / 저장 79장 / 얼굴없음 4장 / 대상아님 8장 / 실패 0장</tspan></text>
  <text x="18" y="234" fill="#6c7086" font-size="12.5">doyun · minchan 중 한 명이라도 있으면 통과(OR) — yyyy-mm 폴더로 통합 저장</text>
</svg>
